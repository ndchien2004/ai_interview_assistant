services:
  postgres:
    image: postgres:16-alpine
    container_name: ai_interview_postgres
    restart: always
    environment:
      POSTGRES_DB: ai_interview_db
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: ai_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: