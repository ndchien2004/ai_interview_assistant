server.port=8080

spring.application.name=ai-interview-backend

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ai_interview_db}
spring.datasource.username=${DB_USERNAME:ai_user}
spring.datasource.password=${DB_PASSWORD:ai_password}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.security.jwt.secret=${JWT_SECRET:dev-ai-interview-secret-key-change-me-please-32bytes}
app.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
