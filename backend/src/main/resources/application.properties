server.port=8080

spring.application.name=ai-interview-backend
spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ai_interview_db}
spring.datasource.username=${DB_USERNAME:ai_user}
spring.datasource.password=${DB_PASSWORD:ai_password}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.baseline-version=${FLYWAY_BASELINE_VERSION:1}
spring.flyway.locations=classpath:db/migration

app.security.jwt.secret=${JWT_SECRET:dev-ai-interview-secret-key-change-me-please-32bytes}
app.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

app.openai.api-key=${OPENAI_API_KEY:}
app.openai.model=${OPENAI_MODEL:gpt-5-mini}
app.openai.realtime-enabled=${OPENAI_REALTIME_ENABLED:false}
app.openai.realtime-model=${OPENAI_REALTIME_MODEL:gpt-realtime}
app.openai.realtime-voice=${OPENAI_REALTIME_VOICE:marin}
app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
app.resume.ai-enabled=${RESUME_AI_ENABLED:true}
app.interview.ai-enabled=${INTERVIEW_AI_ENABLED:true}
app.resume.max-file-size-mb=${RESUME_MAX_FILE_SIZE_MB:5}
app.google.client-id=${GOOGLE_CLIENT_ID:}
app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
app.cloudinary.api-key=${CLOUDINARY_API_KEY:}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
app.cloudinary.url=${CLOUDINARY_URL:}
app.sms.provider=${APP_SMS_PROVIDER:log}
app.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
app.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
app.twilio.from-phone-number=${TWILIO_FROM_PHONE_NUMBER:}
app.twilio.messaging-service-sid=${TWILIO_MESSAGING_SERVICE_SID:}
app.auth.otp-expiration-minutes=${AUTH_OTP_EXPIRATION_MINUTES:10}
app.auth.otp-resend-cooldown-seconds=${AUTH_OTP_RESEND_COOLDOWN_SECONDS:60}
app.auth.otp-max-attempts=${AUTH_OTP_MAX_ATTEMPTS:5}
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:no-reply@ai-interview.local}

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:25}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:false}
